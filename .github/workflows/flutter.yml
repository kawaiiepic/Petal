name: Flutter action

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true
          pub-cache: true
      - run: flutter pub get
      - run: flutter build apk
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
  ios-build:
    runs-on: macos-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true
          pub-cache: true
      - run: flutter pub get
      - name: Build Flutter IPA
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cd Payload
          ln -s ../Runner.app
          cd ..
          zip -r bookadapt_unsigned.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v2
        with:
          name: ios_ipa
          path: build/ios/iphoneos/*.ipa
  linux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true
          pub-cache: true
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev
      - run: flutter build linux
      - name: Upload Linux-build
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: build/linux/x64/release/bundle/blssmpetal
      
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true
          pub-cache: true
      - run: flutter build windows
      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: release-exe
          path: build/windows/x64/runner/Release/blssmpetal.exe
